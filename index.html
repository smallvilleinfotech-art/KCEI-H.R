<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>KNOSK HR System</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/@supabase/supabase-js@2"></script>
<script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
    "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
  }
}
</script>
<style>
  :root{
    --knosk-navy:#0c2a52;       /* deep blue ink — headings, active pill, buttons, dark cards */
    --knosk-blue:#1f5fa8;       /* primary blue accent — fills, rings, highlights */
    --knosk-blue-light:#4f8ddb; /* lighter blue — gradient stops, hovers */
    --knosk-gold:#f2a900;       /* KNOSK gold — logo, salary badge, highlights */
    --knosk-gold-light:#ffc94d;
    --knosk-bg:#f2f6fb;         /* light blue-white surface fill */
    --knosk-line:#e5ebf3;
    --knosk-text:#12233d;
    --knosk-muted:#5b6f8c;
  }
  *{box-sizing:border-box;}
  body{
    font-family:'Inter',ui-sans-serif,'Segoe UI',system-ui,sans-serif;
    background:linear-gradient(150deg,#fbe7b8 0%, #f2c675 22%, #dce9f7 55%, #c9def2 100%);
    background-attachment:fixed;
    color:var(--knosk-text);margin:0;font-size:15px;line-height:1.5;-webkit-font-smoothing:antialiased;
  }
  ::-webkit-scrollbar{width:9px;height:9px;}
  ::-webkit-scrollbar-thumb{background:rgba(12,42,82,.25);border-radius:8px;}
  .brand-grad{background:linear-gradient(160deg,var(--knosk-navy) 0%,#163a63 55%,var(--knosk-blue) 130%);}
  .gold-grad{background:linear-gradient(135deg,var(--knosk-gold) 0%,var(--knosk-gold-light) 100%);}
  .green-grad{background:linear-gradient(135deg,var(--knosk-blue) 0%,var(--knosk-blue-light) 100%);} /* kept name for compatibility, now blue */
  .text-outline{text-shadow:0 1px 3px rgba(0,0,0,.65), 0 0 10px rgba(0,0,0,.35), 0 2px 1px rgba(0,0,0,.4);}
  .photo-top{object-fit:cover;object-position:top center;}
  .card{background:#fff;border:1px solid var(--knosk-line);border-radius:18px;box-shadow:0 1px 2px rgba(16,38,72,.05), 0 10px 28px -12px rgba(12,30,60,.14);}
  .btn-primary{background:var(--knosk-navy);color:#fff;border-radius:12px;padding:11px 20px;font-weight:600;font-size:14.5px;transition:.15s;}
  .btn-primary:hover{background:var(--knosk-blue);}
  .btn-gold{background:var(--knosk-gold);color:#12253f;border-radius:12px;padding:11px 20px;font-weight:700;font-size:14.5px;transition:.15s;}
  .btn-gold:hover{background:var(--knosk-gold-light);}
  .btn-ghost{background:#fff;color:var(--knosk-navy);border:1px solid var(--knosk-line);border-radius:12px;padding:9px 16px;font-weight:600;font-size:13.5px;transition:.15s;}
  .btn-ghost:hover{background:#eef3fb;border-color:#d3ddec;}
  .nav-item{display:flex;align-items:center;gap:13px;padding:12px 16px;border-radius:13px;color:#dbe7fa;font-size:15px;font-weight:500;cursor:pointer;transition:.15s;line-height:1.2;}
  .nav-item .ic{font-size:19px;width:22px;text-align:center;flex-shrink:0;}
  .nav-item:hover{background:rgba(255,255,255,.10);color:#fff;}
  .nav-item.active{background:var(--knosk-gold);color:#12253f;font-weight:700;box-shadow:0 4px 14px -4px rgba(242,169,0,.6);}
  .tbl th{text-align:left;font-size:12px;text-transform:uppercase;letter-spacing:.05em;color:#8598b3;font-weight:700;padding:14px 18px;border-bottom:1px solid var(--knosk-line);background:#fafbfd;}
  .tbl td{padding:14px 18px;font-size:14.5px;border-bottom:1px solid var(--knosk-line);vertical-align:middle;color:var(--knosk-text);}
  .tbl tr:hover td{background:#f8fafd;}
  .tbl tr:last-child td{border-bottom:none;}
  .badge{display:inline-flex;align-items:center;padding:5px 13px;border-radius:999px;font-size:12.5px;font-weight:700;letter-spacing:.01em;}
  .modal-backdrop{position:fixed;inset:0;background:rgba(12,42,82,.55);backdrop-filter:blur(3px);z-index:50;display:flex;align-items:center;justify-content:center;padding:20px;}
  .modal-box{background:#fff;border-radius:20px;max-width:680px;width:100%;max-height:90vh;overflow-y:auto;padding:30px;box-shadow:0 30px 60px -12px rgba(12,42,82,.4);}
  input[type=text],input[type=number],input[type=date],input[type=email],input[type=password],select,textarea{
    width:100%;border:1.5px solid var(--knosk-line);border-radius:11px;padding:11px 14px;font-size:14.5px;background:#fbfcfe;color:var(--knosk-text);transition:.15s;
  }
  input:focus,select:focus,textarea:focus{outline:none;border-color:var(--knosk-gold);box-shadow:0 0 0 4px rgba(242,169,0,.15);}
  label.field-label{font-size:13px;font-weight:700;color:#5b6f8c;margin-bottom:6px;display:block;}
  .tab-scroll::-webkit-scrollbar{display:none;}
  .pill-track-ngo{background:#e7f0ff;color:#1f5fa8;}
  .pill-track-school{background:#fff3d6;color:#a06b00;}
  .sev-info{background:#e7f0ff;color:#1f5fa8;}
  .sev-warning{background:#fff3d6;color:#a06b00;}
  .sev-critical{background:#fde3e3;color:#b3261e;}
  .status-active{background:#e3f8ea;color:#1a7f43;}
  .status-onboarding{background:#e7f0ff;color:#1f5fa8;}
  .status-probation{background:#fff3d6;color:#a06b00;}
  .status-offboarding{background:#fde3e3;color:#b3261e;}
  .status-departed{background:#eceff4;color:#5b6f8c;}
  .status-candidate{background:#f1e9ff;color:#6a3fc4;}
  .status-reassigned{background:#e0f7f5;color:#0a7d72;}
  .stat-icon{width:46px;height:46px;border-radius:13px;display:flex;align-items:center;justify-content:center;font-size:22px;}

  /* --- capsules & rings (dashboard widgets) --- */
  .capsule-track{position:relative;height:36px;border-radius:999px;background:#eef2f8;overflow:hidden;}
  .capsule-fill{height:100%;border-radius:999px;transition:width .3s;}
  .capsule-label{position:absolute;left:12px;top:50%;transform:translateY(-50%);font-size:12.5px;font-weight:800;color:#fff;}
  .ring-badge{border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
  .ring-inner{background:#fff;border-radius:50%;display:flex;flex-direction:column;align-items:center;justify-content:center;box-shadow:inset 0 0 0 1px var(--knosk-line);}

  /* --- accordion (Quick Panels) --- */
  details.acc{border-bottom:1px solid var(--knosk-line);padding:14px 0;}
  details.acc:last-child{border-bottom:none;}
  details.acc summary{cursor:pointer;list-style:none;display:flex;align-items:center;justify-content:space-between;gap:10px;font-weight:700;font-size:14.5px;color:var(--knosk-text);}
  details.acc summary::-webkit-details-marker{display:none;}
  details.acc summary:after{content:'⌄';color:#9db0c9;font-size:15px;font-weight:900;transition:transform .2s;margin-left:auto;padding-left:8px;}
  details.acc[open] summary:after{transform:rotate(180deg);}
  details.acc .acc-body{padding-top:10px;font-size:13.5px;color:#5b6f8c;line-height:1.5;}

  /* --- top nav bar --- */
  .topnav-item{padding:9px 15px;border-radius:999px;font-size:13.5px;font-weight:600;color:#5b6f8c;white-space:nowrap;cursor:pointer;transition:.15s;flex-shrink:0;}
  .topnav-item:hover{background:#eef3fb;color:var(--knosk-navy);}
  .topnav-item.active{background:var(--knosk-navy);color:#fff;box-shadow:0 4px 12px -4px rgba(12,42,82,.5);}
  .icon-btn{width:42px;height:42px;border-radius:50%;background:#f3f6fb;display:flex;align-items:center;justify-content:center;font-size:17px;cursor:pointer;border:1px solid var(--knosk-line);transition:.15s;position:relative;flex-shrink:0;}
  .icon-btn:hover{background:#eef3fb;}
  #alertBadge{position:absolute;top:-3px;right:-3px;background:#e0483e;color:#fff;font-size:10px;font-weight:800;min-width:17px;height:17px;border-radius:999px;display:flex;align-items:center;justify-content:center;padding:0 3px;border:2px solid #fff;}
  .avatar-circle{width:42px;height:42px;border-radius:50%;background:var(--knosk-navy);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:13px;cursor:pointer;flex-shrink:0;border:none;}

  #orgCanvasWrap{position:relative;width:100%;height:72vh;border-radius:18px;overflow:hidden;background:radial-gradient(ellipse at 50% 20%, #12335e 0%, #0a1f3d 70%, #071730 100%);}
  .org-node-box{pointer-events:auto;cursor:pointer;user-select:none;padding:12px 18px;border-radius:12px;font-size:14px;font-weight:700;text-align:center;box-shadow:0 4px 14px rgba(0,0,0,.35);border:2px solid rgba(255,255,255,.25);white-space:nowrap;transition:transform .15s;}
  .org-node-box:hover{transform:scale(1.06);}
  .org-node-box .sub{display:block;font-weight:500;font-size:11.5px;opacity:.85;margin-top:3px;}
  .spin{animation:spin 1s linear infinite;}
  @keyframes spin{to{transform:rotate(360deg);}}
  @keyframes ringSpin3d{0%{transform:rotateY(0deg) rotateX(0deg);}50%{transform:rotateY(20deg) rotateX(7deg);}100%{transform:rotateY(0deg) rotateX(0deg);}}
  .fade-in{animation:fadeIn .2s ease;}
  @keyframes fadeIn{from{opacity:0;transform:translateY(4px);}to{opacity:1;transform:translateY(0);}}
</style>
</head>

async function staffOptions(){
  const {data} = await supabase.from('staff').select('id, full_name, job_title').order('full_name');
  return (data||[]).map(s=>({value:s.id, label:`${s.full_name} — ${s.job_title||''}`}));
}
async function deptOptions(){
  const {data} = await supabase.from('departments').select('id, name').order('name');
  return (data||[]).map(d=>({value:d.id, label:d.name}));
}
async function jdOptions(){
  const {data} = await supabase.from('job_descriptions').select('id, job_title, track').order('job_title');
  return (data||[]).map(d=>({value:d.id, label:`${d.job_title} (${d.track})`}));
}
async function onboardingCaseOptions(){
  const {data} = await supabase.from('onboarding_cases').select('id, staff_id, staff:staff_id(full_name)').limit(200);
  return (data||[]).map(d=>({value:d.id, label:`${d.staff?.full_name||'—'} (${d.id.slice(0,8)})`}));
}

============================================================================ */
function trackBadge(v){ if(!v) return '—'; return `<span class="badge pill-track-${v}">${v.toUpperCase()}</span>`; }
function avatarCell(url, row){
  const label = (row?.full_name||'?').trim().split(/\s+/).filter(Boolean).slice(0,2).map(w=>w[0].toUpperCase()).join('');
  if(url) return `<img src="${esc(url)}" class="w-9 h-9 rounded-full photo-top border border-slate-200" alt="">`;
  return `<div class="w-9 h-9 rounded-full flex items-center justify-center text-[11px] font-extrabold text-white green-grad">${label}</div>`;
}
async function uploadFile(bucket, file){
  const ext = file.name.split('.').pop();
  const path = `${crypto.randomUUID()}.${ext}`;
  const {error} = await supabase.storage.from(bucket).upload(path, file, {upsert:true});
  if(error) throw error;
  const {data} = supabase.storage.from(bucket).getPublicUrl(path);
  return data.publicUrl;
}
function statusBadge(v){ if(!v) return '—'; return `<span class="badge status-${v}">${v}</span>`; }
function docStatusBadge(v){
  const map={missing:'sev-critical', pending:'sev-warning', on_file:'status-active', expired:'sev-critical'};
  return `<span class="badge ${map[v]||'sev-info'}">${v}</span>`;
}
function accessStatusBadge(v){
  const map={active:'status-active', revoked:'status-departed', pending:'sev-warning'};
  return `<span class="badge ${map[v]||'sev-info'}">${v}</span>`;
}
function esc(s){ return (s===null||s===undefined) ? '' : String(s).replace(/[&<>"]/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }
function timeAgo(iso){
  if(!iso) return '—';
  const d = new Date(iso);
  return d.toLocaleDateString(undefined,{year:'numeric',month:'short',day:'numeric'}) + ' ' + d.toLocaleTimeString(undefined,{hour:'2-digit',minute:'2-digit'});
}

async function renderEntityPage(entityKey){
  const cfg = ENTITIES[entityKey];
  const extraBtn = entityKey==='staff' ? `<button id="collectiveReportBtn" class="btn-gold">🖨 Collective Report</button>` : '';
  renderShell(`<div id="pageRoot">${pageHeader(cfg.title, '', extraBtn + `<button id="addBtn" class="btn-primary">+ Add ${cfg.title.replace(/s$/,'')}</button>`)}
  <div class="card overflow-x-auto"><table class="tbl w-full" id="entityTable"><thead><tr>${cfg.columns.map(c=>`<th>${c.label}</th>`).join('')}<th></th></tr></thead>
  <tbody><tr><td colspan="${cfg.columns.length+1}" class="text-center py-8 text-slate-400">Loading…</td></tr></tbody></table></div></div>`);
  document.getElementById('addBtn').addEventListener('click', ()=>openEntityForm(entityKey));
  document.getElementById('collectiveReportBtn')?.addEventListener('click', printCollectiveReport);
  await loadEntityTable(entityKey);
}

async function loadEntityTable(entityKey){
  const cfg = ENTITIES[entityKey];
  let q = supabase.from(cfg.table).select(cfg.select);
  if(cfg.order) q = q.order(cfg.order.col, {ascending: cfg.order.asc});
  const {data, error} = await q.limit(500);
  const tbody = document.querySelector('#entityTable tbody');
  if(error){ tbody.innerHTML = `<tr><td colspan="99" class="text-red-600 py-6 text-center">${esc(error.message)}</td></tr>`; return; }
  if(!data || data.length===0){ tbody.innerHTML = `<tr><td colspan="99" class="text-center py-8 text-slate-400">No records yet. Click "Add" to create one.</td></tr>`; return; }
  tbody.innerHTML = data.map(row=>`
    <tr>
      ${cfg.columns.map(c=>`<td>${c.render ? c.render(row[c.key], row) : esc(row[c.key] ?? '—')}</td>`).join('')}
      <td class="text-right whitespace-nowrap">
        ${entityKey==='staff'?`<button class="btn-ghost text-xs mr-1" data-view="${row[cfg.pk]}">View</button>`:''}
        <button class="btn-ghost text-xs mr-1" data-edit="${row[cfg.pk]}">Edit</button>
        <button class="btn-ghost text-xs text-red-600" data-del="${row[cfg.pk]}">Delete</button>
      </td>
    </tr>`).join('');
  tbody.querySelectorAll('[data-view]').forEach(b=>b.addEventListener('click', ()=>{ state.selectedStaffId = b.dataset.view; state.route='staff_profile'; router(); }));
  tbody.querySelectorAll('[data-edit]').forEach(b=>b.addEventListener('click', ()=>openEntityForm(entityKey, b.dataset.edit)));
  tbody.querySelectorAll('[data-del]').forEach(b=>b.addEventListener('click', ()=>deleteEntity(entityKey, b.dataset.del)));
}

async function deleteEntity(entityKey, id){
  if(!confirm('Delete this record? This cannot be undone.')) return;
  const cfg = ENTITIES[entityKey];
  const {error} = await supabase.from(cfg.table).delete().eq(cfg.pk, id);
  if(error) alert(error.message); else loadEntityTable(entityKey);
}

async function openEntityForm(entityKey, id=null){
  const cfg = ENTITIES[entityKey];
  let existing = {};
  if(id){
    const {data} = await supabase.from(cfg.table).select('*').eq(cfg.pk, id).single();
    existing = data || {};
  }
  const optionCache = {};
  for(const f of cfg.fields){
    if(f.optionsFn){ optionCache[f.key] = await f.optionsFn(); }
  }
  const backdrop = document.createElement('div');
  backdrop.className = 'modal-backdrop';
  backdrop.innerHTML = `
    <div class="modal-box fade-in">
      <div class="flex items-center justify-between mb-4">
        <h2 class="text-lg font-extrabold">${id?'Edit':'Add'} ${cfg.title.replace(/s$/,'')}</h2>
        <button id="closeModal" class="text-slate-400 hover:text-slate-700 text-xl leading-none">&times;</button>
      </div>
      <form id="entityForm" class="grid grid-cols-1 sm:grid-cols-2 gap-3">
        ${cfg.fields.map(f=>renderField(f, existing[f.key], optionCache[f.key])).join('')}
        <div class="sm:col-span-2 flex justify-end gap-2 mt-3 pt-3 border-t">
          <button type="button" id="cancelBtn" class="btn-ghost">Cancel</button>
          <button type="submit" class="btn-primary">Save</button>
        </div>
      </form>
    </div>`;
  document.body.appendChild(backdrop);
  const close = ()=>backdrop.remove();
  backdrop.querySelectorAll('[data-upload-for]').forEach(inp=>{
    inp.addEventListener('change', async ()=>{
      const file = inp.files[0]; if(!file) return;
      const key = inp.dataset.uploadFor, bucket = inp.dataset.bucket;
      const status = document.getElementById('uploadStatus_'+key);
      const preview = document.getElementById('preview_'+key);
      status.textContent = 'Uploading…';
      try{
        const url = await uploadFile(bucket, file);
        document.getElementById('f_'+key).value = url;
        preview.innerHTML = file.type.startsWith('image/') ? `<img src="${url}" class="w-full h-full object-cover">` : '📄 On file';
        status.textContent = 'Uploaded ✓';
      }catch(err){ status.textContent = 'Upload failed: '+err.message; }
    });
  });
  backdrop.querySelector('#closeModal').addEventListener('click', close);
  backdrop.querySelector('#cancelBtn').addEventListener('click', close);
  backdrop.addEventListener('click', e=>{ if(e.target===backdrop) close(); });
  backdrop.querySelector('#entityForm').addEventListener('submit', async e=>{
    e.preventDefault();
    const payload = {};
    for(const f of cfg.fields){
      const el = document.getElementById('f_'+f.key);
      if(!el) continue;
      if(f.type==='checkbox') payload[f.key] = el.checked;
      else if(f.type==='number') payload[f.key] = el.value===''? null : Number(el.value);
      else payload[f.key] = el.value===''? null : el.value;
    }
    let error;
    if(id){ ({error} = await supabase.from(cfg.table).update(payload).eq(cfg.pk, id)); }
    else { ({error} = await supabase.from(cfg.table).insert(payload)); }
    if(error){ alert(error.message); return; }
    close();
    loadEntityTable(entityKey);
    if(entityKey==='staff') state.staffCache = [];
  });
}

function renderField(f, value, options){
  const val = value ?? '';
  const wrapWide = (f.type==='textarea' || f.type==='file') ? 'sm:col-span-2' : '';
  let input = '';
  if(f.type==='select'){
    const opts = f.options || options || [];
    input = `<select id="f_${f.key}">${f.required?'':'<option value="">—</option>'}${opts.map(o=>`<option value="${esc(o.value)}" ${String(val)===String(o.value)?'selected':''}>${esc(o.label)}</option>`).join('')}</select>`;
  } else if(f.type==='textarea'){
    input = `<textarea id="f_${f.key}" rows="3">${esc(val)}</textarea>`;
  } else if(f.type==='checkbox'){
    return `<div class="flex items-center gap-2 pt-5"><input type="checkbox" id="f_${f.key}" ${val?'checked':''} class="w-4 h-4"><label for="f_${f.key}" class="text-sm font-medium">${f.label}</label></div>`;
  } else if(f.type==='file'){
    const isImg = f.accept && f.accept.includes('image');
    return `<div class="${wrapWide}">
      <label class="field-label">${f.label}</label>
      <div class="flex items-center gap-3">
        <div id="preview_${f.key}" class="w-16 h-16 rounded-xl overflow-hidden bg-slate-100 flex items-center justify-center text-slate-400 text-[10px] flex-shrink-0 border border-slate-200 text-center">${val ? (isImg?`<img src="${esc(val)}" class="w-full h-full object-cover">`:'📄 On file') : 'No file'}</div>
        <div class="flex-1 min-w-0">
          <input type="file" data-upload-for="${f.key}" data-bucket="${f.bucket}" accept="${f.accept||'*/*'}" class="text-xs">
          <div id="uploadStatus_${f.key}" class="text-xs text-slate-400 mt-1.5">${val?'File on record — choose a new one to replace it.':'Upload a file, or leave blank.'}</div>
        </div>
      </div>
      <input type="hidden" id="f_${f.key}" value="${esc(val)}">
    </div>`;
  } else {
    input = `<input type="${f.type}" id="f_${f.key}" value="${esc(val)}" ${f.required?'required':''}>`;
  }
  return `<div class="${wrapWide}"><label class="field-label">${f.label}</label>${input}</div>`;
}

  </div>`;
  containerEl.innerHTML = staffList.map(slideHtml).join('');
  containerEl.querySelectorAll('.spotlight-slide').forEach(s=>s.addEventListener('click', ()=>{
    state.selectedStaffId = s.dataset.id; state.route = 'staff_profile'; router();
  }));
  if(staffList.length>1){
    let idx = 0;
    const slides = containerEl.querySelectorAll('.spotlight-slide');
    spotlightTimer = setInterval(()=>{
      slides[idx].classList.remove('opacity-100'); slides[idx].classList.add('opacity-0');
      slides[idx].style.pointerEvents = 'none';
      idx = (idx+1) % slides.length;
      slides[idx].classList.remove('opacity-0'); slides[idx].classList.add('opacity-100');
      slides[idx].style.pointerEvents = 'auto';
    }, 4000);
  }
}

function initials(name){
  if(!name) return '?';
  return name.trim().split(/\s+/).filter(Boolean).slice(0,2).map(w=>w[0].toUpperCase()).join('');
}
function clamp(n,lo,hi){ return Math.max(lo, Math.min(hi, n)); }
function daysBetween(a,b){ return Math.round((new Date(b) - new Date(a)) / 86400000); }
function fmtShort(d){ if(!d) return '—'; return new Date(d).toLocaleDateString(undefined,{month:'short', day:'numeric'}); }

function ringHtml(pct, size=88, color='var(--knosk-navy)', label=''){
  pct = clamp(Math.round(pct||0), 0, 100);
  return `<div class="ring-badge" style="width:${size}px;height:${size}px;background:conic-gradient(${color} ${pct*3.6}deg, #eef2f8 0deg);">
    <div class="ring-inner" style="width:${size-14}px;height:${size-14}px;">
      <div style="font-size:${size*0.2}px;font-weight:800;color:var(--knosk-navy);line-height:1;">${pct}%</div>
      ${label?`<div style="font-size:${size*0.09}px;color:#8598b3;font-weight:600;margin-top:2px;">${label}</div>`:''}
    </div>
  </div>`;
}
function capsuleHtml(label, pct, color, width=130){
  pct = clamp(Math.round(pct||0), 0, 100);
  return `<div>
    <div class="text-xs font-semibold text-slate-500 mb-1.5">${label}</div>
    <div class="capsule-track" style="width:${width}px"><div class="capsule-fill" style="width:${Math.max(pct,14)}%;background:${color}"></div><span class="capsule-label">${pct}%</span></div>
  </div>`;
}
function bigStatHtml(icon, value, label){
  return `<div class="flex items-center gap-2.5">
    <span class="text-xl">${icon}</span>
    <div><div class="text-2xl font-extrabold leading-none" style="color:var(--knosk-navy)">${value}</div><div class="text-xs text-slate-500 font-semibold mt-0.5">${label}</div></div>
  </div>`;
}

  document.getElementById('probationCard').querySelector('[data-route-to]')?.addEventListener('click', ()=>{ state.route='staff'; router(); });

  /* --- dark card: onboarding overview (top) + task checklist (bottom), one tall column --- */
  const onboardTotal = onboardOpen?.length || 0;
  const gatesPassed = (onboardOpen||[]).filter(c=>c.gate_passed).length;
  const profileOnly = (onboardOpen||[]).filter(c=>!c.gate_passed && c.staff_profile_activated).length;
  const earlyStage = onboardTotal - gatesPassed - profileOnly;
  const onboardPct = onboardTotal? Math.round(gatesPassed/onboardTotal*100) : 0;
  const opct = n => onboardTotal? Math.round(n/onboardTotal*100) : 0;

    <div class="flex items-center justify-between mb-2.5">

    </div>`).join('') : `<div class="text-sm text-slate-400 py-4 text-center">Nothing due in the next 14 days.</div>`;

  document.getElementById('keyDatesCard').innerHTML += stripHtml.replace('mb-5','mb-3') + listHtml;

  document.querySelectorAll('[data-resolve]').forEach(b=>b.addEventListener('click', async ()=>{
    await supabase.from('alerts').update({resolved:true, resolved_at:new Date().toISOString()}).eq('id', b.dataset.resolve);
    renderDashboard();
  }));
}

async function buildOrgChart(filterTrack){
  if(orgThree){ orgThree.dispose(); orgThree = null; }
  const wrap = document.getElementById('orgCanvasWrap');
  wrap.querySelectorAll('canvas, .css3d-root').forEach(n=>n.remove());
  const loading = document.getElementById('orgLoading') || document.createElement('div');

  const {data: nodes, error} = await supabase.from('org_nodes').select('*, staff:staff_id(id, full_name, job_title, status)').order('sort_order');
  if(error){ wrap.innerHTML = `<div class="text-red-400 p-6 text-sm">${esc(error.message)}</div>`; return; }

  const filtered = (nodes||[]).filter(n => filterTrack==='all' || n.track===filterTrack || n.track===null);
  if(filtered.length===0){ wrap.innerHTML = `<div class="text-white/60 p-6 text-sm text-center">No organogram data for this filter.</div>`; return; }

  // Build tree structure
  const byId = {}; filtered.forEach(n=>byId[n.id]={...n, children:[]});
  const roots = [];
  filtered.forEach(n=>{
    if(n.parent_node_id && byId[n.parent_node_id]) byId[n.parent_node_id].children.push(byId[n.id]);
    else roots.push(byId[n.id]);
  });

  // Layout: simple tidy tree (level = depth, x = position among leaves)
  const levelGapY = 130, siblingGapX = 210;
  let leafCounter = 0;
  function layout(node, depth){
    node.depth = depth;
    if(node.children.length===0){
      node.x = leafCounter * siblingGapX; leafCounter++;
    } else {
      node.children.forEach(c=>layout(c, depth+1));
      const xs = node.children.map(c=>c.x);
      node.x = (Math.min(...xs)+Math.max(...xs))/2;
    }
    node.y = -depth * levelGapY;
  }
  roots.forEach(r=>layout(r, 0));

  // Center all roots as a forest
  const allX = Object.values(byId).map(n=>n.x);
  const minX = Math.min(...allX), maxX = Math.max(...allX);
  const centerOffset = (minX+maxX)/2;
  Object.values(byId).forEach(n=>n.x -= centerOffset);

  // ---- THREE.js scene (WebGL for connector lines + CSS3D for labels) ----
  const width = wrap.clientWidth, height = wrap.clientHeight;
  const scene = new THREE.Scene();
  const camera = new THREE.PerspectiveCamera(55, width/height, 1, 5000);
  camera.position.set(0, 220, 900);

  const glRenderer = new THREE.WebGLRenderer({alpha:true, antialias:true});
  glRenderer.setSize(width, height);
  glRenderer.setClearColor(0x000000, 0);
  glRenderer.domElement.style.position = 'absolute';
  glRenderer.domElement.style.top = '0';
  glRenderer.domElement.style.pointerEvents = 'none';
  wrap.appendChild(glRenderer.domElement);

  const cssRenderer = new CSS3DRenderer({width, height});
  cssRenderer.setSize(width, height);
  cssRenderer.domElement.className = 'css3d-root';
  cssRenderer.domElement.style.position = 'absolute';
  cssRenderer.domElement.style.top = '0';
  wrap.appendChild(cssRenderer.domElement);

  const controls = new OrbitControls(camera, cssRenderer.domElement);
  controls.enableDamping = true;
  controls.dampingFactor = 0.08;
  controls.minDistance = 200;
  controls.maxDistance = 2200;
  controls.autoRotate = false;
  controls.autoRotateSpeed = 1.4;
  controls.target.set(0, -200, 0);
  controls.update();
  currentOrgControls = controls;

  // connector lines
  const lineMat = new THREE.LineBasicMaterial({color:0x3f7fd1, transparent:true, opacity:0.6});
  const lineGroup = new THREE.Group(); scene.add(lineGroup);
  function addLine(a,b){
    const geo = new THREE.BufferGeometry().setFromPoints([
      new THREE.Vector3(a.x,a.y,0), new THREE.Vector3(b.x,b.y,0)
    ]);
    lineGroup.add(new THREE.Line(geo, lineMat));
  }

  const colorMap = {blue:['#1f5fa8','#3f7fd1'], green:['#0a7d72','#12a894'], gold:['#c98600','#f2a900'], neutral:['#3a4a63','#5a6d8c']};
  const cssObjects = [];
  function colorFor(hint){ return colorMap[hint] || colorMap.neutral; }

  function addNode(n){
    const [c1,c2] = colorFor(n.color_hint);
    const div = document.createElement('div');
    div.className = 'org-node-box';
    div.style.background = `linear-gradient(135deg, ${c1}, ${c2})`;
    div.style.color = '#fff';
    const personLine = n.staff ? `<span class="sub">${esc(n.staff.full_name)}</span>` : (n.subtitle ? `<span class="sub">${esc(n.subtitle)}</span>` : '');
    div.innerHTML = `${esc(n.label)}${personLine}`;
    const obj = new CSS3DObject(div);
    obj.position.set(n.x, n.y, 0);
    scene.add(obj);
    cssObjects.push(obj);
    div.addEventListener('click', ()=>{ focusNode(n, obj); showNodePanel(n); });
    if(n.parent_node_id && byId[n.parent_node_id]) addLine(n, byId[n.parent_node_id]);
    n.children.forEach(addNode);
  }
  roots.forEach(addNode);

  function showNodePanel(n){
    const panel = document.getElementById('orgDetailPanel');
    const body = document.getElementById('orgPanelBody');
    if(!panel || !body) return;
    body.innerHTML = `
      <div class="text-xs uppercase tracking-wide text-blue-300 font-bold mb-1">${n.track?n.track.toUpperCase():'ORG-WIDE'}</div>
      <h2 class="text-xl font-extrabold mb-1">${esc(n.label.trim())}</h2>
      ${n.subtitle?`<div class="text-blue-200 text-sm mb-4">${esc(n.subtitle)}</div>`:'<div class="mb-4"></div>'}
      ${n.staff ? `
        <div class="p-3 rounded-xl mb-3" style="background:rgba(255,255,255,.08);">
          <div class="text-[11px] text-blue-300 uppercase font-bold mb-1">Assigned Staff</div>
          <div class="font-bold">${esc(n.staff.full_name)}</div>
          <div class="text-blue-200 text-xs">${esc(n.staff.job_title||'')}</div>
          <div class="text-blue-200 text-xs mt-1">Status: ${esc(n.staff.status||'—')}</div>
        </div>
        <button class="btn-gold text-xs w-full" onclick="state.selectedStaffId='${n.staff.id}'; state.route='staff_profile'; router();">View Full Profile →</button>
      ` : `<div class="text-blue-200 text-sm">No staff currently assigned to this seat.</div>`}
      <div class="mt-5 pt-4 border-t border-white/10 text-[11px] text-blue-300">Reports up through the KNOSK organogram — drag to explore, click any box to jump here.</div>
    `;
    panel.style.transform = 'translateX(0%)';
  }

  function focusNode(n, obj){
    const targetPos = new THREE.Vector3(n.x, n.y, 0);
    const camTarget = new THREE.Vector3(n.x, n.y, 420);
    const startCam = camera.position.clone();
    const startTarget = controls.target.clone();
    let t = 0;
    function animate(){
      t += 0.035;
      if(t>1) t=1;
      camera.position.lerpVectors(startCam, camTarget, t);
      controls.target.lerpVectors(startTarget, targetPos, t);
      controls.update();
      if(t<1) requestAnimationFrame(animate);
    }
    animate();
  }

  document.getElementById('orgLoading')?.remove();

  let raf;
  function tick(){
    controls.update();
    glRenderer.render(scene, camera);
    cssRenderer.render(scene, camera);
    raf = requestAnimationFrame(tick);
  }
  tick();

  function onResize(){
    const w = wrap.clientWidth, h = wrap.clientHeight;
    camera.aspect = w/h; camera.updateProjectionMatrix();
    glRenderer.setSize(w,h); cssRenderer.setSize(w,h);
  }
  window.addEventListener('resize', onResize);

  orgThree = {
    dispose(){
      cancelAnimationFrame(raf);
      window.removeEventListener('resize', onResize);
      controls.dispose();
      glRenderer.dispose();
      if(currentOrgControls===controls) currentOrgControls=null;
    }
  };
}

function iso3dBarChart(items){
  // items: [{label, value, max, color}] — CSS-only isometric "3D" bar chart
  return `<div style="perspective:1000px;">
    <div style="display:flex;align-items:flex-end;gap:22px;height:120px;margin:14px auto 26px;width:fit-content;transform:rotateX(38deg) rotateZ(-28deg);transform-style:preserve-3d;">
      ${items.map(it=>{
        const h = Math.max(10, Math.round((it.value/Math.max(it.max,1))*100));
        return `<div style="position:relative;width:30px;height:${h}px;background:linear-gradient(180deg, ${it.color}, ${it.color}cc);box-shadow:0 0 0 1px rgba(0,0,0,.06);">
          <span style="position:absolute;top:-9px;left:0;width:30px;height:9px;background:${it.color};filter:brightness(1.25);transform:skewX(-45deg) scaleY(.6);transform-origin:bottom left;"></span>
          <span style="position:absolute;top:0;right:-9px;width:9px;height:100%;background:${it.color};filter:brightness(.7);transform:skewY(-45deg) scaleX(.6);transform-origin:top left;"></span>
        </div>`;
      }).join('')}
    </div>
    <div style="display:flex;gap:22px;width:fit-content;margin:0 auto;justify-content:center;">
      ${items.map(it=>`<div style="width:30px;text-align:center;"><div class="font-extrabold text-sm" style="color:var(--knosk-navy)">${it.value}</div><div class="text-[9.5px] text-slate-400 font-semibold leading-tight mt-0.5">${it.label}</div></div>`).join('')}
    </div>
  </div>`;
}

function rotatingRing3d(pct, label){
  pct = clamp(Math.round(pct||0),0,100);
  return `<div style="perspective:700px;">
    <div style="width:120px;height:120px;margin:0 auto;animation:ringSpin 10s linear infinite;transform-style:preserve-3d;" class="ring-badge" style="background:conic-gradient(var(--knosk-blue) ${pct*3.6}deg, #eef2f8 0deg);">
    </div>
  </div>`;
}

    <div class="kv"><span>Track / Entity</span><span>${esc((sp.track||'').toUpperCase())} — ${esc(sp.entity||'—')}</span></div>
    <div class="kv"><span>Status</span><span>${esc(sp.status)}</span></div>
    <div class="kv"><span>Start Date</span><span>${sp.start_date||'—'}</span></div>
    <div class="kv"><span>Probation Ends</span><span>${sp.probation_end_date||'—'}</span></div>
    <div class="kv"><span>Monthly Salary</span><span>${sp.monthly_salary?'₦'+Number(sp.monthly_salary).toLocaleString():'—'}</span></div>
    <div class="kv"><span>KNOSK Email</span><span>${esc(sp.knosk_email||'—')}</span></div>

    <h2>Onboarding</h2>
    ${activeCase?`<div class="kv"><span>Stage</span><span>${esc(activeCase.stage)}</span></div><div class="kv"><span>Gate Passed</span><span>${activeCase.gate_passed?'Yes':'No'}</span></div>
      <table><thead><tr><th>Task</th><th>Week</th><th>Status</th></tr></thead><tbody>
      ${tasks.map(t=>`<tr><td>${esc(t.task_name)}</td><td>${esc(t.week_label||'—')}</td><td>${t.completed?'Done':'Pending'}</td></tr>`).join('')||'<tr><td colspan="3">No tasks logged.</td></tr>'}
      </tbody></table>` : '<p>No onboarding case on file.</p>'}

    <h2>Offboarding</h2>
    ${offboardCases&&offboardCases[0]?`<div class="kv"><span>Reason</span><span>${esc(offboardCases[0].reason)}</span></div><div class="kv"><span>Status</span><span>${esc(offboardCases[0].status)}</span></div><div class="kv"><span>Last Working Day</span><span>${offboardCases[0].last_working_day||'—'}</span></div>`:'<p>No offboarding case on file.</p>'}

    <h2>Documents (${docs?.length||0})</h2>
    <table><thead><tr><th>Type</th><th>Status</th></tr></thead><tbody>
    ${(docs&&docs.length)?docs.map(d=>`<tr><td>${esc(d.doc_type)}</td><td>${esc(d.status)}</td></tr>`).join(''):'<tr><td colspan="2">None on file.</td></tr>'}
    </tbody></table>

    <h2>Access Inventory (${access?.length||0})</h2>
    <table><thead><tr><th>Access</th><th>Type</th><th>Status</th></tr></thead><tbody>
    ${(access&&access.length)?access.map(a=>`<tr><td>${esc(a.name)}</td><td>${esc(a.access_type)}</td><td>${esc(a.status)}</td></tr>`).join(''):'<tr><td colspan="3">None on file.</td></tr>'}
    </tbody></table>

    <h2>Open Alerts (${alerts?.length||0})</h2>
    <table><thead><tr><th>Type</th><th>Message</th><th>Severity</th></tr></thead><tbody>
    ${(alerts&&alerts.length)?alerts.map(a=>`<tr><td>${esc(a.alert_type)}</td><td>${esc(a.message)}</td><td>${esc(a.severity)}</td></tr>`).join(''):'<tr><td colspan="3">No open alerts.</td></tr>'}
    </tbody></table>
  `);
  reportShellClose(w);
}

async function printCollectiveReport(){
  const {data: staff} = await supabase.from('staff').select('*, department:department_id(name)').order('full_name');
  const w = reportShellOpen('Collective Staff Report');
  const byTrack = {ngo:0, school:0};
  (staff||[]).forEach(s=>{ if(s.track) byTrack[s.track]=(byTrack[s.track]||0)+1; });
  w.document.write(`
    <h2>Summary</h2>
    <div class="kv"><span>Total Staff</span><span>${staff?.length||0}</span></div>
    <div class="kv"><span>NGO Track</span><span>${byTrack.ngo}</span></div>
    <div class="kv"><span>School Track</span><span>${byTrack.school}</span></div>
    <div class="kv"><span>Active</span><span>${(staff||[]).filter(s=>s.status==='active').length}</span></div>
    <div class="kv"><span>On Probation</span><span>${(staff||[]).filter(s=>s.status==='probation').length}</span></div>

    <h2>Full Staff List</h2>
    <table><thead><tr><th>Name</th><th>Title</th><th>Track</th><th>Department</th><th>Status</th><th>Start Date</th></tr></thead><tbody>
    ${(staff||[]).map(s=>`<tr><td>${esc(s.full_name)}</td><td>${esc(s.job_title||'—')}</td><td>${esc((s.track||'').toUpperCase())}</td><td>${esc(s.department?.name||'—')}</td><td>${esc(s.status)}</td><td>${s.start_date||'—'}</td></tr>`).join('')}
    </tbody></table>
  `);
  reportShellClose(w);
}

/* ============================================================================
   11. ROUTER
============================================================================ */
async function router(){
  if(state.route==='dashboard') return renderDashboard();
  if(state.route==='organogram') return renderOrganogram();
  if(state.route==='audit_log') return renderAuditLog();
  if(state.route==='settings') return renderSettings();
  if(state.route==='staff_profile') return renderStaffProfile(state.selectedStaffId);
  if(ENTITIES[state.route]) return renderEntityPage(state.route);
  return renderDashboard();
}

/* ============================================================================
   12. BOOT
============================================================================ */
async function boot(){
  const {data: {session: s}} = await supabase.auth.getSession();
  session = s;
  if(!session){ renderLoginScreen(); return; }
  const {data: au} = await supabase.from('app_users').select('*').eq('id', session.user.id).single();
  currentAppUser = au;
  router();
}

(function start(){
  supabase.auth.onAuthStateChange((event, s)=>{ session = s; if(event==='SIGNED_OUT'){ renderLoginScreen(); } });
  boot();
})();
</script>
