<style>
  :root{
    --knosk-navy:#0c2a52;
    --knosk-blue:#1f5fa8;
    --knosk-blue-light:#3f7fd1;
    --knosk-gold:#f2a900;
    --knosk-gold-light:#ffc94d;
    --knosk-bg:#f5f7fb;
    --knosk-line:#e4e9f2;
  }
  *{box-sizing:border-box;}
  body{font-family:'Segoe UI',ui-sans-serif,system-ui,sans-serif;background:var(--knosk-bg);color:var(--knosk-navy);margin:0;}
  ::-webkit-scrollbar{width:8px;height:8px;}
  ::-webkit-scrollbar-thumb{background:#c9d4e5;border-radius:8px;}
  .brand-grad{background:linear-gradient(135deg,var(--knosk-navy) 0%,var(--knosk-blue) 60%,var(--knosk-blue-light) 100%);}
  .gold-grad{background:linear-gradient(135deg,var(--knosk-gold) 0%,var(--knosk-gold-light) 100%);}
  .card{background:#fff;border:1px solid var(--knosk-line);border-radius:14px;}
  .btn-primary{background:var(--knosk-navy);color:#fff;border-radius:10px;padding:8px 16px;font-weight:600;font-size:14px;transition:.15s;}
  .btn-primary:hover{background:var(--knosk-blue);}
  .btn-gold{background:var(--knosk-gold);color:#0c2a52;border-radius:10px;padding:8px 16px;font-weight:700;font-size:14px;transition:.15s;}
  .btn-gold:hover{background:var(--knosk-gold-light);}
  .btn-ghost{background:transparent;color:var(--knosk-navy);border:1px solid var(--knosk-line);border-radius:10px;padding:7px 14px;font-weight:600;font-size:13px;}
  .btn-ghost:hover{background:#eef2f9;}
  .nav-item{display:flex;align-items:center;gap:10px;padding:10px 14px;border-radius:10px;color:#cfe0f5;font-size:14px;font-weight:500;cursor:pointer;transition:.15s;}
  .nav-item:hover{background:rgba(255,255,255,.08);color:#fff;}
  .nav-item.active{background:var(--knosk-gold);color:var(--knosk-navy);font-weight:700;}
  .tbl th{text-align:left;font-size:11px;text-transform:uppercase;letter-spacing:.04em;color:#7086a8;padding:10px 14px;border-bottom:1px solid var(--knosk-line);}
  .tbl td{padding:10px 14px;font-size:13.5px;border-bottom:1px solid var(--knosk-line);vertical-align:middle;}
  .tbl tr:hover td{background:#f9fbfe;}
  .badge{display:inline-flex;align-items:center;padding:3px 10px;border-radius:999px;font-size:11.5px;font-weight:700;}
  .modal-backdrop{position:fixed;inset:0;background:rgba(12,42,82,.55);backdrop-filter:blur(2px);z-index:50;display:flex;align-items:center;justify-content:center;padding:20px;}
  .modal-box{background:#fff;border-radius:16px;max-width:640px;width:100%;max-height:90vh;overflow-y:auto;padding:26px;}
  input[type=text],input[type=number],input[type=date],input[type=email],input[type=password],select,textarea{
    width:100%;border:1px solid var(--knosk-line);border-radius:9px;padding:8px 11px;font-size:13.5px;background:#fbfcfe;color:var(--knosk-navy);
  }
  input:focus,select:focus,textarea:focus{outline:2px solid var(--knosk-gold);outline-offset:1px;border-color:var(--knosk-gold);}
  label.field-label{font-size:12px;font-weight:700;color:#5b6f8c;margin-bottom:4px;display:block;}
  .tab-scroll::-webkit-scrollbar{display:none;}
  .pill-track-ngo{background:#e7f0ff;color:#1f5fa8;}
  .pill-track-school{background:#fff3d6;color:#a06b00;}
  .sev-info{background:#e7f0ff;color:#1f5fa8;}
  .sev-warning{background:#fff3d6;color:#a06b00;}
  .sev-critical{background:#fde3e3;color:#b3261e;}
  .status-active{background:#e3f8ea;color:#1a7f43;}
  .status-onboarding{background:#e7f0ff;color:#1f5fa8;}
  .status-probation{background:#fff3d6;color:#a06b00;}
  .status-offboarding{background:#fde3e3;color:#b3261e;}
  .status-departed{background:#eceff4;color:#5b6f8c;}
  .status-candidate{background:#f1e9ff;color:#6a3fc4;}
  .status-reassigned{background:#e0f7f5;color:#0a7d72;}
  #orgCanvasWrap{position:relative;width:100%;height:72vh;border-radius:14px;overflow:hidden;background:radial-gradient(ellipse at 50% 20%, #12335e 0%, #0a1f3d 70%, #071730 100%);}
  .org-node-box{pointer-events:auto;cursor:pointer;user-select:none;padding:10px 16px;border-radius:10px;font-size:13px;font-weight:700;text-align:center;box-shadow:0 4px 14px rgba(0,0,0,.35);border:2px solid rgba(255,255,255,.25);white-space:nowrap;transition:transform .15s;}
  .org-node-box:hover{transform:scale(1.06);}
  .org-node-box .sub{display:block;font-weight:500;font-size:10.5px;opacity:.85;margin-top:2px;}
  .spin{animation:spin 1s linear infinite;}
  @keyframes spin{to{transform:rotate(360deg);}}
  .fade-in{animation:fadeIn .2s ease;}
  @keyframes fadeIn{from{opacity:0;transform:translateY(4px);}to{opacity:1;transform:translateY(0);}}
</style>

  const {data} = await supabase.from('staff').select('id, full_name, job_title').order('full_name');

function trackBadge(v){ if(!v) return '—'; return `<span class="badge pill-track-${v}">${v.toUpperCase()}</span>`; }
function statusBadge(v){ if(!v) return '—'; return `<span class="badge status-${v}">${v}</span>`; }
function docStatusBadge(v){
  const map={missing:'sev-critical', pending:'sev-warning', on_file:'status-active', expired:'sev-critical'};
  return `<span class="badge ${map[v]||'sev-info'}">${v}</span>`;
}
function accessStatusBadge(v){
  const map={active:'status-active', revoked:'status-departed', pending:'sev-warning'};
  return `<span class="badge ${map[v]||'sev-info'}">${v}</span>`;
}
function esc(s){ return (s===null||s===undefined) ? '' : String(s).replace(/[&<>"]/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }
function timeAgo(iso){
  if(!iso) return '—';
  const d = new Date(iso);
  return d.toLocaleDateString(undefined,{year:'numeric',month:'short',day:'numeric'}) + ' ' + d.toLocaleTimeString(undefined,{hour:'2-digit',minute:'2-digit'});
}

async function renderEntityPage(entityKey){
  const cfg = ENTITIES[entityKey];

  document.getElementById('addBtn').addEventListener('click', ()=>openEntityForm(entityKey));
  await loadEntityTable(entityKey);
}

async function loadEntityTable(entityKey){
  const cfg = ENTITIES[entityKey];
  let q = supabase.from(cfg.table).select(cfg.select);
  if(cfg.order) q = q.order(cfg.order.col, {ascending: cfg.order.asc});
  const {data, error} = await q.limit(500);
  const tbody = document.querySelector('#entityTable tbody');
  if(error){ tbody.innerHTML = `<tr><td colspan="99" class="text-red-600 py-6 text-center">${esc(error.message)}</td></tr>`; return; }
  if(!data || data.length===0){ tbody.innerHTML = `<tr><td colspan="99" class="text-center py-8 text-slate-400">No records yet. Click "Add" to create one.</td></tr>`; return; }
  tbody.innerHTML = data.map(row=>`
    <tr>
      ${cfg.columns.map(c=>`<td>${c.render ? c.render(row[c.key]) : esc(row[c.key] ?? '—')}</td>`).join('')}
      <td class="text-right whitespace-nowrap">
        <button class="btn-ghost text-xs mr-1" data-edit="${row[cfg.pk]}">Edit</button>
        <button class="btn-ghost text-xs text-red-600" data-del="${row[cfg.pk]}">Delete</button>
      </td>
    </tr>`).join('');
  tbody.querySelectorAll('[data-edit]').forEach(b=>b.addEventListener('click', ()=>openEntityForm(entityKey, b.dataset.edit)));
  tbody.querySelectorAll('[data-del]').forEach(b=>b.addEventListener('click', ()=>deleteEntity(entityKey, b.dataset.del)));
}

async function deleteEntity(entityKey, id){
  if(!confirm('Delete this record? This cannot be undone.')) return;
  const cfg = ENTITIES[entityKey];
  const {error} = await supabase.from(cfg.table).delete().eq(cfg.pk, id);
  if(error) alert(error.message); else loadEntityTable(entityKey);
}

async function openEntityForm(entityKey, id=null){
  const cfg = ENTITIES[entityKey];
  let existing = {};
  if(id){
    const {data} = await supabase.from(cfg.table).select('*').eq(cfg.pk, id).single();
    existing = data || {};
  }
  const optionCache = {};
  for(const f of cfg.fields){
    if(f.optionsFn){ optionCache[f.key] = await f.optionsFn(); }
  }
  const backdrop = document.createElement('div');
  backdrop.className = 'modal-backdrop';
  backdrop.innerHTML = `
    <div class="modal-box fade-in">
      <div class="flex items-center justify-between mb-4">
        <h2 class="text-lg font-extrabold">${id?'Edit':'Add'} ${cfg.title.replace(/s$/,'')}</h2>
        <button id="closeModal" class="text-slate-400 hover:text-slate-700 text-xl leading-none">&times;</button>
      </div>
      <form id="entityForm" class="grid grid-cols-1 sm:grid-cols-2 gap-3">
        ${cfg.fields.map(f=>renderField(f, existing[f.key], optionCache[f.key])).join('')}
        <div class="sm:col-span-2 flex justify-end gap-2 mt-3 pt-3 border-t">
          <button type="button" id="cancelBtn" class="btn-ghost">Cancel</button>
          <button type="submit" class="btn-primary">Save</button>
        </div>
      </form>
    </div>`;
  document.body.appendChild(backdrop);
  const close = ()=>backdrop.remove();
  backdrop.querySelector('#closeModal').addEventListener('click', close);
  backdrop.querySelector('#cancelBtn').addEventListener('click', close);
  backdrop.addEventListener('click', e=>{ if(e.target===backdrop) close(); });
  backdrop.querySelector('#entityForm').addEventListener('submit', async e=>{
    e.preventDefault();
    const payload = {};
    for(const f of cfg.fields){
      const el = document.getElementById('f_'+f.key);
      if(!el) continue;
      if(f.type==='checkbox') payload[f.key] = el.checked;
      else if(f.type==='number') payload[f.key] = el.value===''? null : Number(el.value);
      else payload[f.key] = el.value===''? null : el.value;
    }
    let error;
    if(id){ ({error} = await supabase.from(cfg.table).update(payload).eq(cfg.pk, id)); }
    else { ({error} = await supabase.from(cfg.table).insert(payload)); }
    if(error){ alert(error.message); return; }
    close();
    loadEntityTable(entityKey);
    if(entityKey==='staff') state.staffCache = [];
  });
}

function renderField(f, value, options){
  const val = value ?? '';
  const wrapWide = (f.type==='textarea') ? 'sm:col-span-2' : '';
  let input = '';
  if(f.type==='select'){
    const opts = f.options || options || [];
    input = `<select id="f_${f.key}">${f.required?'':'<option value="">—</option>'}${opts.map(o=>`<option value="${esc(o.value)}" ${String(val)===String(o.value)?'selected':''}>${esc(o.label)}</option>`).join('')}</select>`;
  } else if(f.type==='textarea'){
    input = `<textarea id="f_${f.key}" rows="3">${esc(val)}</textarea>`;
  } else if(f.type==='checkbox'){
    return `<div class="flex items-center gap-2 pt-5"><input type="checkbox" id="f_${f.key}" ${val?'checked':''} class="w-4 h-4"><label for="f_${f.key}" class="text-sm font-medium">${f.label}</label></div>`;
  } else {
    input = `<input type="${f.type}" id="f_${f.key}" value="${esc(val)}" ${f.required?'required':''}>`;
  }
  return `<div class="${wrapWide}"><label class="field-label">${f.label}</label>${input}</div>`;
}

function barRow(label, value, total, color){

async function buildOrgChart(filterTrack){
  if(orgThree){ orgThree.dispose(); orgThree = null; }
  const wrap = document.getElementById('orgCanvasWrap');
  wrap.querySelectorAll('canvas, .css3d-root').forEach(n=>n.remove());
  const loading = document.getElementById('orgLoading') || document.createElement('div');

  const {data: nodes, error} = await supabase.from('org_nodes').select('*, staff:staff_id(id, full_name, job_title, status)').order('sort_order');
  if(error){ wrap.innerHTML = `<div class="text-red-400 p-6 text-sm">${esc(error.message)}</div>`; return; }

  const filtered = (nodes||[]).filter(n => filterTrack==='all' || n.track===filterTrack || n.track===null);
  if(filtered.length===0){ wrap.innerHTML = `<div class="text-white/60 p-6 text-sm text-center">No organogram data for this filter.</div>`; return; }

  // Build tree structure
  const byId = {}; filtered.forEach(n=>byId[n.id]={...n, children:[]});
  const roots = [];
  filtered.forEach(n=>{
    if(n.parent_node_id && byId[n.parent_node_id]) byId[n.parent_node_id].children.push(byId[n.id]);
    else roots.push(byId[n.id]);
  });

  // Layout: simple tidy tree (level = depth, x = position among leaves)
  const levelGapY = 130, siblingGapX = 210;
  let leafCounter = 0;
  function layout(node, depth){
    node.depth = depth;
    if(node.children.length===0){
      node.x = leafCounter * siblingGapX; leafCounter++;
    } else {
      node.children.forEach(c=>layout(c, depth+1));
      const xs = node.children.map(c=>c.x);
      node.x = (Math.min(...xs)+Math.max(...xs))/2;
    }
    node.y = -depth * levelGapY;
  }
  roots.forEach(r=>layout(r, 0));

  // Center all roots as a forest
  const allX = Object.values(byId).map(n=>n.x);
  const minX = Math.min(...allX), maxX = Math.max(...allX);
  const centerOffset = (minX+maxX)/2;
  Object.values(byId).forEach(n=>n.x -= centerOffset);

  // ---- THREE.js scene (WebGL for connector lines + CSS3D for labels) ----
  const width = wrap.clientWidth, height = wrap.clientHeight;
  const scene = new THREE.Scene();
  const camera = new THREE.PerspectiveCamera(55, width/height, 1, 5000);
  camera.position.set(0, 220, 900);

  const glRenderer = new THREE.WebGLRenderer({alpha:true, antialias:true});
  glRenderer.setSize(width, height);
  glRenderer.setClearColor(0x000000, 0);
  glRenderer.domElement.style.position = 'absolute';
  glRenderer.domElement.style.top = '0';
  glRenderer.domElement.style.pointerEvents = 'none';
  wrap.appendChild(glRenderer.domElement);

  const cssRenderer = new CSS3DRenderer({width, height});
  cssRenderer.setSize(width, height);
  cssRenderer.domElement.className = 'css3d-root';
  cssRenderer.domElement.style.position = 'absolute';
  cssRenderer.domElement.style.top = '0';
  wrap.appendChild(cssRenderer.domElement);

  const controls = new OrbitControls(camera, cssRenderer.domElement);
  controls.enableDamping = true;
  controls.dampingFactor = 0.08;
  controls.minDistance = 200;
  controls.maxDistance = 2200;
  controls.target.set(0, -200, 0);
  controls.update();

  // connector lines
  const lineMat = new THREE.LineBasicMaterial({color:0x3f7fd1, transparent:true, opacity:0.6});
  const lineGroup = new THREE.Group(); scene.add(lineGroup);
  function addLine(a,b){
    const geo = new THREE.BufferGeometry().setFromPoints([
      new THREE.Vector3(a.x,a.y,0), new THREE.Vector3(b.x,b.y,0)
    ]);
    lineGroup.add(new THREE.Line(geo, lineMat));
  }

  const colorMap = {blue:['#1f5fa8','#3f7fd1'], green:['#0a7d72','#12a894'], gold:['#c98600','#f2a900'], neutral:['#3a4a63','#5a6d8c']};
  const cssObjects = [];
  function colorFor(hint){ return colorMap[hint] || colorMap.neutral; }

  function addNode(n){
    const [c1,c2] = colorFor(n.color_hint);
    const div = document.createElement('div');
    div.className = 'org-node-box';
    div.style.background = `linear-gradient(135deg, ${c1}, ${c2})`;
    div.style.color = '#fff';
    const personLine = n.staff ? `<span class="sub">${esc(n.staff.full_name)}</span>` : (n.subtitle ? `<span class="sub">${esc(n.subtitle)}</span>` : '');
    div.innerHTML = `${esc(n.label)}${personLine}`;
    const obj = new CSS3DObject(div);
    obj.position.set(n.x, n.y, 0);
    scene.add(obj);
    cssObjects.push(obj);
    div.addEventListener('click', ()=>focusNode(n, obj));
    if(n.parent_node_id && byId[n.parent_node_id]) addLine(n, byId[n.parent_node_id]);
    n.children.forEach(addNode);
  }
  roots.forEach(addNode);

  function focusNode(n, obj){
    const targetPos = new THREE.Vector3(n.x, n.y, 0);
    const camTarget = new THREE.Vector3(n.x, n.y, 420);
    const startCam = camera.position.clone();
    const startTarget = controls.target.clone();
    let t = 0;
    function animate(){
      t += 0.035;
      if(t>1) t=1;
      camera.position.lerpVectors(startCam, camTarget, t);
      controls.target.lerpVectors(startTarget, targetPos, t);
      controls.update();
      if(t<1) requestAnimationFrame(animate);
    }
    animate();
  }

  document.getElementById('orgLoading')?.remove();

  let raf;
  function tick(){
    controls.update();
    glRenderer.render(scene, camera);
    cssRenderer.render(scene, camera);
    raf = requestAnimationFrame(tick);
  }
  tick();

  function onResize(){
    const w = wrap.clientWidth, h = wrap.clientHeight;
    camera.aspect = w/h; camera.updateProjectionMatrix();
    glRenderer.setSize(w,h); cssRenderer.setSize(w,h);
  }
  window.addEventListener('resize', onResize);

  orgThree = {
    dispose(){
      cancelAnimationFrame(raf);
      window.removeEventListener('resize', onResize);
      controls.dispose();
      glRenderer.dispose();
    }
  };
}

/* ============================================================================
   11. ROUTER
============================================================================ */
async function router(){
  if(state.route==='dashboard') return renderDashboard();
  if(state.route==='organogram') return renderOrganogram();
  if(state.route==='audit_log') return renderAuditLog();
  if(state.route==='settings') return renderSettings();
  if(ENTITIES[state.route]) return renderEntityPage(state.route);
  return renderDashboard();
}

/* ============================================================================
   12. BOOT
============================================================================ */
async function boot(){
  const {data: {session: s}} = await supabase.auth.getSession();
  session = s;
  if(!session){ renderLoginScreen(); return; }
  const {data: au} = await supabase.from('app_users').select('*').eq('id', session.user.id).single();
  currentAppUser = au;
  router();
}

(function start(){
  supabase.auth.onAuthStateChange((event, s)=>{ session = s; if(event==='SIGNED_OUT'){ renderLoginScreen(); } });
  boot();
})();
</script>
